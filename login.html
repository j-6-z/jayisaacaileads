<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — JAYISAAC AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --orange:#C95E1A;
  --orange-bright:#E8742E;
  --orange-dark:#A84B12;
  --charcoal:#1C1F24;
  --charcoal-deep:#141619;
  --ink:#1A2433;
  --slate:#5B6878;
  --mist:#8C97A6;
  --line:#E5E9EF;
  --bg:#F7F8FA;
  --red:#DC2626;
  --red-soft:#FEE8E8;
  --green:#1B8A5A;
  --green-soft:#E5F4EC;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Plus Jakarta Sans',-apple-system,sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(900px 500px at 85% -10%, rgba(201,94,26,.18), transparent 60%),
    radial-gradient(700px 500px at -10% 110%, rgba(201,94,26,.1), transparent 55%),
    var(--charcoal-deep);
  padding:24px;
}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

.card{
  width:100%;max-width:420px;background:#fff;border-radius:18px;
  padding:38px 36px 32px;
  box-shadow:0 24px 70px rgba(0,0,0,.45);
}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:26px}
.brand .logo{
  width:40px;height:40px;border-radius:11px;
  background:linear-gradient(135deg,var(--orange-bright),var(--orange-dark));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(201,94,26,.35);flex-shrink:0;
}
.brand .logo svg{width:21px;height:21px}
.brand .name{font-size:16px;font-weight:800;letter-spacing:-.01em;color:var(--ink)}
.brand .name span{color:var(--orange)}

.mode-tabs{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;
  background:var(--bg);border:1px solid var(--line);border-radius:10px;
  padding:4px;margin-bottom:22px;
}
.mode-tab{
  border:none;background:none;padding:9px;border-radius:7px;
  font-size:13px;font-weight:700;color:var(--slate);transition:.15s;
}
.mode-tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(14,27,44,.1)}

h1{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.01em;margin-bottom:4px}
.sub{font-size:13px;color:var(--slate);margin-bottom:20px}

label{display:block;font-size:12px;font-weight:700;color:var(--ink);margin-bottom:6px}
.field{margin-bottom:14px}
input[type=email],input[type=password],input[type=text]{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;
  font-size:13.5px;outline:none;transition:.12s;color:var(--ink);
}
input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(201,94,26,.12)}
::placeholder{color:var(--mist)}

.msg{
  display:none;font-size:12.5px;font-weight:600;border-radius:9px;
  padding:10px 13px;margin-bottom:14px;line-height:1.45;
}
.msg.error{display:block;background:var(--red-soft);color:var(--red)}
.msg.ok{display:block;background:var(--green-soft);color:var(--green)}

.submit{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:var(--orange);color:#fff;font-size:14px;font-weight:800;
  transition:.15s;box-shadow:0 4px 14px rgba(201,94,26,.3);
}
.submit:hover{background:var(--orange-dark)}
.submit:disabled{opacity:.6;cursor:wait}

.divider{
  display:flex;align-items:center;gap:12px;margin:18px 0;
  font-size:11px;font-weight:700;color:var(--mist);text-transform:uppercase;letter-spacing:.08em;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--line)}

.google-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:11px;border:1px solid var(--line);border-radius:10px;background:#fff;
  font-size:13.5px;font-weight:700;color:var(--ink);transition:.15s;
}
.google-btn:hover{border-color:var(--mist);background:var(--bg)}
.google-btn svg{width:17px;height:17px}

.consents{display:none;margin-bottom:16px}
.consents.show{display:block}
.consent{
  display:flex;align-items:flex-start;gap:9px;
  font-size:12px;line-height:1.5;color:var(--slate);margin-bottom:10px;cursor:pointer;
}
.consent:last-child{margin-bottom:0}
.consent input[type=checkbox]{
  flex-shrink:0;width:16px;height:16px;margin-top:1px;cursor:pointer;
  accent-color:var(--orange);
}
.consent a{color:var(--orange);font-weight:700;text-decoration:none}
.consent a:hover{text-decoration:underline}
.consent .opt{color:var(--mist);font-weight:600}

.foot{
  margin-top:20px;text-align:center;font-size:12px;color:var(--mist);
}
.foot a{color:var(--orange);font-weight:700;text-decoration:none}
.foot a:hover{text-decoration:underline}

.loading-veil{
  position:fixed;inset:0;background:var(--charcoal-deep);
  display:flex;align-items:center;justify-content:center;z-index:100;
  transition:opacity .25s;
}
.loading-veil.hide{opacity:0;pointer-events:none}
.spinner{
  width:34px;height:34px;border-radius:50%;
  border:3px solid rgba(232,116,46,.25);border-top-color:var(--orange-bright);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="loading-veil" id="veil"><div class="spinner"></div></div>

<div class="card">
  <div class="brand">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2L4 5.5V11c0 5 3.4 9.4 8 10.5 4.6-1.1 8-5.5 8-10.5V5.5L12 2z" fill="#fff"/></svg></div>
    <div class="name">JAYISAAC <span>AI</span></div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tabIn" onclick="setMode('in')">Sign in</button>
    <button class="mode-tab" id="tabUp" onclick="setMode('up')">Create account</button>
  </div>

  <h1 id="title">Welcome back</h1>
  <p class="sub" id="subtitle">Log in to keep prospecting.</p>

  <div class="msg" id="msg"></div>

  <div class="field" id="nameField" style="display:none">
    <label for="name">Full name</label>
    <input type="text" id="name" placeholder="Jay Turner" autocomplete="name">
  </div>
  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <div class="consents" id="consents">
    <label class="consent">
      <input type="checkbox" id="agreeTerms">
      <span>I agree to the <a href="terms.html" target="_blank" rel="noopener">Terms of Use</a> and <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.</span>
    </label>
    <label class="consent">
      <input type="checkbox" id="marketingOptIn">
      <span>Send me product updates, tips, and offers. <span class="opt">(optional)</span></span>
    </label>
  </div>

  <button class="submit" id="submitBtn" onclick="submit()">Sign in</button>

  <div class="divider">or</div>

  <button class="google-btn" onclick="googleSignIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0012 23z"/><path fill="#FBBC05" d="M5.84 14.1A6.6 6.6 0 015.49 12c0-.73.13-1.44.35-2.1V7.06H2.18a11 11 0 000 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.16-3.16A11 11 0 002.18 7.06L5.84 9.9c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
    Continue with Google
  </button>

  <div class="foot">
    <span id="footResetWrap"><a href="#" onclick="resetPassword();return false">Forgot password?</a> · </span>
    <a href="https://jayisaacai.com">Back to jayisaacai.com</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  updateProfile, sendPasswordResetEmail,
  GoogleAuthProvider, signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHs92C3ariQ285KUkodOHV04sEVKr_dQ8",
  authDomain: "jayisaac-ai.firebaseapp.com",
  projectId: "jayisaac-ai",
  storageBucket: "jayisaac-ai.firebasestorage.app",
  messagingSenderId: "967801239356",
  appId: "1:967801239356:web:0df3f35af72ce6e79b9039",
  measurementId: "G-V91DS21PGE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let mode = "in";
const $ = id => document.getElementById(id);

/* already logged in? straight to app */
onAuthStateChanged(auth, user => {
  if (user) { location.replace("app.html"); }
  else { $("veil").classList.add("hide"); }
});

window.setMode = m => {
  mode = m;
  $("tabIn").classList.toggle("active", m==="in");
  $("tabUp").classList.toggle("active", m==="up");
  $("nameField").style.display = m==="up" ? "block" : "none";
  $("consents").classList.toggle("show", m==="up");
  $("title").textContent = m==="up" ? "Start prospecting" : "Welcome back";
  $("subtitle").textContent = m==="up" ? "Create your account — free credits included." : "Log in to keep prospecting.";
  $("submitBtn").textContent = m==="up" ? "Create account" : "Sign in";
  $("footResetWrap").style.display = m==="up" ? "none" : "inline";
  hideMsg();
};

function showMsg(text, type){ const m=$("msg"); m.textContent=text; m.className="msg "+type; }
function hideMsg(){ $("msg").className="msg"; }

const ERRORS = {
  "auth/invalid-email":"That email doesn't look right.",
  "auth/user-not-found":"No account with that email — try Create account.",
  "auth/wrong-password":"Wrong password. Try again or reset it below.",
  "auth/invalid-credential":"Email or password is incorrect.",
  "auth/email-already-in-use":"That email already has an account — sign in instead.",
  "auth/weak-password":"Password needs at least 6 characters.",
  "auth/too-many-requests":"Too many attempts — wait a minute and try again.",
  "auth/popup-closed-by-user":"Google sign-in was closed before finishing.",
  "auth/network-request-failed":"Network issue — check your connection.",
};
function friendly(e){ return ERRORS[e.code] || ("Something went wrong ("+(e.code||"unknown")+")."); }

window.submit = async () => {
  hideMsg();
  const email = $("email").value.trim();
  const pass = $("password").value;
  if(!email || !pass){ showMsg("Email and password are both required.","error"); return; }
  const btn = $("submitBtn");
  btn.disabled = true;
  try {
    if(mode === "up"){
      if(!$("agreeTerms").checked){
        showMsg("Please agree to the Terms of Use and Privacy Policy to create your account.","error");
        btn.disabled = false; return;
      }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      const name = $("name").value.trim();
      if(name) await updateProfile(cred.user, { displayName: name });
      /* stash consent so app.html writes it onto the new user doc at creation */
      try {
        sessionStorage.setItem("jia_signup_consent", JSON.stringify({
          agreedToTerms: true,
          agreedAt: new Date().toISOString(),
          marketingOptIn: $("marketingOptIn").checked
        }));
      } catch(_){}
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
    location.replace("app.html");
  } catch(e){
    showMsg(friendly(e), "error");
    btn.disabled = false;
  }
};

window.googleSignIn = async () => {
  hideMsg();
  try {
    await signInWithPopup(auth, provider);
    location.replace("app.html");
  } catch(e){ showMsg(friendly(e), "error"); }
};

window.resetPassword = async () => {
  hideMsg();
  const email = $("email").value.trim();
  if(!email){ showMsg("Type your email above first, then hit Forgot password.","error"); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg("Reset link sent — check your inbox.","ok");
  } catch(e){ showMsg(friendly(e), "error"); }
};

/* Enter key submits */
document.addEventListener("keydown", e => { if(e.key==="Enter") window.submit(); });
</script>
</body>
</html>
