<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — JAYISAAC AI</title>
<link rel="icon" href="/my-favicon/favicon.ico" sizes="any">
<link rel="icon" href="/my-favicon/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/my-favicon/favicon-96x96.png" type="image/png" sizes="96x96">
<link rel="apple-touch-icon" href="/my-favicon/apple-touch-icon.png" sizes="180x180">
<link rel="manifest" href="/my-favicon/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
<style>
/* design system — matches index.html */
:root{
  --paper:      #FAF7F1;
  --ink:        #1C1822;
  --ink-soft:   #4E4856;
  --ink-faint:  #8E8896;
  --line:       #E9E2D6;
  --field-line: #D9D8E3;
  --card:       #FFFFFF;

  --blue:       #4F46E5;
  --blue-h:     #4338CA;
  --blue-lt:    #818CF8;
  --blue-soft:  #EEF0FF;
  --blue-line:  #C9CDFA;

  --pur:        #7C3AED;
  --green:      #15803D;
  --green-soft: #E7F6EC;
  --red:        #DC2626;
  --red-soft:   #FEE2E2;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

body{
  font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(900px 520px at 84% -12%, rgba(99,102,241,.14), transparent 62%),
    radial-gradient(700px 500px at -10% 108%, rgba(124,58,237,.09), transparent 58%),
    var(--paper);
  color:var(--ink);
  padding:24px;
  -webkit-font-smoothing:antialiased;
}
button{ font-family:inherit; cursor:pointer }
input{ font-family:inherit }
a:focus-visible, button:focus-visible, input:focus-visible{
  outline:3px solid var(--blue); outline-offset:3px; border-radius:6px;
}

.card{
  width:100%; max-width:430px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:34px 32px 28px;
  box-shadow:0 6px 12px rgba(19,18,31,.03), 0 28px 70px rgba(19,18,31,.09);
}

/* brand */
.brand{ display:flex; align-items:center; gap:11px; margin-bottom:26px }
.brand .logo{
  width:38px; height:38px; border-radius:50%;
  overflow:hidden; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  border:1.5px solid var(--blue-line);
  box-shadow:0 0 0 3px rgba(79,70,229,.08);
  transition:box-shadow .25s;
}
.brand .logo:hover{ box-shadow:0 0 0 4px rgba(79,70,229,.16) }
.brand .logo img{ width:100%; height:100%; object-fit:cover; display:block }
.brand .dot{
  width:7px; height:7px; border-radius:2px; background:var(--blue);
  flex-shrink:0; animation:pip 2.5s infinite;
}
@keyframes pip{ 0%,100%{opacity:1} 50%{opacity:.25} }
.brand .name{
  font-size:.95rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--ink);
}
.brand .name span{ color:var(--blue) }

/* segmented mode control — same as the hero builder */
.mode-tabs{
  display:grid; grid-template-columns:1fr 1fr; gap:2px;
  background:#EAE3D5; border-radius:10px;
  padding:4px; margin-bottom:24px;
}
.mode-tab{
  border:none; background:transparent; padding:9px; border-radius:8px;
  font-size:.85rem; font-weight:600; color:var(--ink-soft);
  transition:background .15s, color .15s, box-shadow .15s;
}
.mode-tab:hover{ color:var(--ink) }
.mode-tab.active{ background:#fff; color:var(--ink); box-shadow:0 1px 3px rgba(19,18,31,.12) }

h1{ font-size:1.25rem; font-weight:700; letter-spacing:-.015em; color:var(--ink); margin-bottom:5px }
.sub{ font-size:.85rem; color:var(--ink-soft); line-height:1.6; margin-bottom:22px }

/* fields */
label{ display:block; font-size:.8rem; font-weight:600; color:var(--ink); margin-bottom:6px }
label em{ font-style:normal; color:var(--blue) }
.field{ margin-bottom:16px }
input[type=email], input[type=password], input[type=text]{
  width:100%; padding:12px 14px;
  border:1px solid var(--field-line); border-radius:9px;
  font-size:.92rem; color:var(--ink); background:#fff;
  outline:none; transition:border-color .15s, box-shadow .15s;
}
input[type=email]:focus, input[type=password]:focus, input[type=text]:focus{
  border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-soft);
}
::placeholder{ color:var(--ink-faint) }

/* messages */
.msg{
  display:none; font-size:.79rem; font-weight:600; border-radius:9px;
  padding:10px 13px; margin-bottom:16px; line-height:1.5;
}
.msg.error{ display:block; background:var(--red-soft); color:var(--red) }
.msg.ok{ display:block; background:var(--green-soft); color:var(--green) }

/* buttons */
.submit{
  width:100%; padding:14px; border:none; border-radius:9px;
  background:var(--blue); color:#fff; font-size:.95rem; font-weight:600;
  transition:background .16s, transform .12s, box-shadow .16s;
  box-shadow:0 8px 20px rgba(79,70,229,.26);
}
.submit:hover{ background:var(--blue-h); transform:translateY(-1px); box-shadow:0 10px 24px rgba(79,70,229,.32) }
.submit:active{ transform:scale(.99) }
.submit:disabled{ opacity:.6; cursor:wait; transform:none }

.divider{
  display:flex; align-items:center; gap:14px; margin:20px 0;
  font-size:.72rem; font-weight:600; color:var(--ink-faint);
  text-transform:uppercase; letter-spacing:.1em;
}
.divider::before, .divider::after{ content:''; flex:1; height:1px; background:var(--line) }

.google-btn{
  width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
  padding:13px; border:1px solid var(--field-line); border-radius:9px; background:#fff;
  font-size:.93rem; font-weight:600; color:var(--ink);
  transition:border-color .16s;
}
.google-btn:hover{ border-color:var(--ink) }
.google-btn svg{ width:18px; height:18px; flex-shrink:0 }

/* consents */
.consents{ display:none; margin-bottom:18px }
.consents.show{ display:block }
.consent{
  display:flex; align-items:flex-start; gap:10px;
  font-size:.78rem; line-height:1.55; color:var(--ink-soft);
  margin-bottom:10px; cursor:pointer;
}
.consent:last-child{ margin-bottom:0 }
.consent input[type=checkbox]{
  flex-shrink:0; width:16px; height:16px; margin-top:1px; cursor:pointer;
  accent-color:var(--blue);
}
.consent a{ color:var(--blue); font-weight:600; text-decoration:none }
.consent a:hover{ text-decoration:underline }
.consent .opt{ color:var(--ink-faint) }

.foot{
  margin-top:20px; padding-top:18px; border-top:1px solid var(--line);
  text-align:center; font-size:.79rem; color:var(--ink-faint); line-height:1.7;
}
.foot a{ color:var(--blue); font-weight:600; text-decoration:none }
.foot a:hover{ text-decoration:underline }

/* loading veil */
.loading-veil{
  position:fixed; inset:0; background:var(--paper);
  display:flex; align-items:center; justify-content:center; z-index:100;
  transition:opacity .25s;
}
.loading-veil.hide{ opacity:0; pointer-events:none }
.spinner{
  width:34px; height:34px; border-radius:50%;
  border:3px solid var(--blue-soft); border-top-color:var(--blue);
  animation:spin .8s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg) } }

@media(max-width:480px){
  .card{ padding:26px 22px 24px }
}
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ animation:none !important; transition:none !important }
}
</style>
</head>
<body>

<div class="loading-veil" id="veil"><div class="spinner"></div></div>

<div class="card">
  <div class="brand">
    <a href="/" class="logo" aria-label="JAYISAAC AI home">
      <img src="/public/new-logo2.jpg" alt="JAYISAAC AI">
    </a>
    <span class="dot"></span>
    <div class="name">JAYISAAC&nbsp;<span>AI</span></div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tabIn" onclick="setMode('in')">Sign in</button>
    <button class="mode-tab" id="tabUp" onclick="setMode('up')">Create account</button>
  </div>

  <h1 id="title">Welcome back</h1>
  <p class="sub" id="subtitle">Log in to keep prospecting.</p>

  <div class="msg" id="msg"></div>

  <div class="field" id="nameField" style="display:none">
    <label for="name">Full name</label>
    <input type="text" id="name" placeholder="Jay Turner" autocomplete="name">
  </div>
  <div class="field">
    <label for="email">Email <em>*</em></label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
  </div>
  <div class="field">
    <label for="password">Password <em>*</em></label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <div class="consents" id="consents">
    <label class="consent">
      <input type="checkbox" id="agreeTerms">
      <span>I agree to the <a href="/terms.html" target="_blank" rel="noopener">Terms of Use</a> and <a href="/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.</span>
    </label>
    <label class="consent">
      <input type="checkbox" id="marketingOptIn">
      <span>Send me product updates, tips, and offers. <span class="opt">(optional)</span></span>
    </label>
  </div>

  <button class="submit" id="submitBtn" onclick="submit()">Sign in</button>

  <div class="divider">or</div>

  <button class="google-btn" onclick="googleSignIn()">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0012 23z"/><path fill="#FBBC05" d="M5.84 14.1A6.6 6.6 0 015.49 12c0-.73.13-1.44.35-2.1V7.06H2.18a11 11 0 000 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.16-3.16A11 11 0 002.18 7.06L5.84 9.9c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
    Continue with Google
  </button>

  <div class="foot">
    <span id="footResetWrap"><a href="#" onclick="resetPassword();return false">Forgot password?</a> · </span>
    <a href="/">Back to jayisaacai.com</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  updateProfile, sendPasswordResetEmail,
  GoogleAuthProvider, signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHs92C3ariQ285KUkodOHV04sEVKr_dQ8",
  authDomain: "jayisaac-ai.firebaseapp.com",
  projectId: "jayisaac-ai",
  storageBucket: "jayisaac-ai.firebasestorage.app",
  messagingSenderId: "967801239356",
  appId: "1:967801239356:web:0df3f35af72ce6e79b9039",
  measurementId: "G-V91DS21PGE"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let mode = "in";
const $ = id => document.getElementById(id);

/* already logged in? straight to app */
onAuthStateChanged(auth, user => {
  if (user) { location.replace("app.html"); }
  else { $("veil").classList.add("hide"); }
});

window.setMode = m => {
  mode = m;
  $("tabIn").classList.toggle("active", m==="in");
  $("tabUp").classList.toggle("active", m==="up");
  $("nameField").style.display = m==="up" ? "block" : "none";
  $("consents").classList.toggle("show", m==="up");
  $("title").textContent = m==="up" ? "Start prospecting" : "Welcome back";
  $("subtitle").textContent = m==="up" ? "Create your account — free credits included." : "Log in to keep prospecting.";
  $("submitBtn").textContent = m==="up" ? "Create account" : "Sign in";
  $("footResetWrap").style.display = m==="up" ? "none" : "inline";
  $("password").setAttribute("autocomplete", m==="up" ? "new-password" : "current-password");
  hideMsg();
};

/* ── carry the homepage signup form through ──
   index.html routes here as /login.html?email=&fname=&lname=
   Land them in Create account with everything filled but the password. */
(function prefillFromSignup(){
  const q = new URLSearchParams(location.search);
  const email = (q.get("email") || "").trim();
  const fname = (q.get("fname") || "").trim();
  const lname = (q.get("lname") || "").trim();
  if(!email && !fname && !lname) return;

  window.setMode("up");
  if(email) $("email").value = email;
  const full = [fname, lname].filter(Boolean).join(" ");
  if(full) $("name").value = full;
  if(email) $("subtitle").textContent = "One more step — set a password and you're in.";
  setTimeout(() => $("password").focus(), 60);
})();

function showMsg(text, type){ const m=$("msg"); m.textContent=text; m.className="msg "+type; }
function hideMsg(){ $("msg").className="msg"; }

const ERRORS = {
  "auth/invalid-email":"That email doesn't look right.",
  "auth/user-not-found":"No account with that email — try Create account.",
  "auth/wrong-password":"Wrong password. Try again or reset it below.",
  "auth/invalid-credential":"Email or password is incorrect.",
  "auth/email-already-in-use":"That email already has an account — sign in instead.",
  "auth/weak-password":"Password needs at least 6 characters.",
  "auth/too-many-requests":"Too many attempts — wait a minute and try again.",
  "auth/popup-closed-by-user":"Google sign-in was closed before finishing.",
  "auth/network-request-failed":"Network issue — check your connection.",
};
function friendly(e){ return ERRORS[e.code] || ("Something went wrong ("+(e.code||"unknown")+")."); }

window.submit = async () => {
  hideMsg();
  const email = $("email").value.trim();
  const pass = $("password").value;
  if(!email || !pass){ showMsg("Email and password are both required.","error"); return; }
  const btn = $("submitBtn");
  btn.disabled = true;
  try {
    if(mode === "up"){
      if(!$("agreeTerms").checked){
        showMsg("Please agree to the Terms of Use and Privacy Policy to create your account.","error");
        btn.disabled = false; return;
      }
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      const name = $("name").value.trim();
      if(name) await updateProfile(cred.user, { displayName: name });
      /* stash consent so app.html writes it onto the new user doc at creation */
      try {
        sessionStorage.setItem("jia_signup_consent", JSON.stringify({
          agreedToTerms: true,
          agreedAt: new Date().toISOString(),
          marketingOptIn: $("marketingOptIn").checked
        }));
      } catch(_){}
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
    location.replace("app.html");
  } catch(e){
    showMsg(friendly(e), "error");
    btn.disabled = false;
  }
};

window.googleSignIn = async () => {
  hideMsg();
  try {
    await signInWithPopup(auth, provider);
    location.replace("app.html");
  } catch(e){ showMsg(friendly(e), "error"); }
};

window.resetPassword = async () => {
  hideMsg();
  const email = $("email").value.trim();
  if(!email){ showMsg("Type your email above first, then hit Forgot password.","error"); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showMsg("Reset link sent — check your inbox.","ok");
  } catch(e){ showMsg(friendly(e), "error"); }
};

/* Enter submits from any field in the card */
document.querySelectorAll(".card input").forEach(el => {
  el.addEventListener("keydown", e => { if(e.key === "Enter") window.submit(); });
});
</script>
</body>
</html>
