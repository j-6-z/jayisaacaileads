<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/my-favicon/favicon.ico" sizes="any">
<link rel="icon" href="/my-favicon/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/my-favicon/favicon-96x96.png" type="image/png" sizes="96x96">
<link rel="apple-touch-icon" href="/my-favicon/apple-touch-icon.png" sizes="180x180">
<link rel="manifest" href="/my-favicon/site.webmanifest">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — JAYISAAC AI</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
<style>
/* design system — matches index.html */
:root{
  --paper:      #FAF7F1;
  --ink:        #1C1822;
  --ink-soft:   #4E4856;
  --ink-faint:  #8E8896;
  --line:       #E9E2D6;
  --field-line: #D9D8E3;

  --blue:       #4F46E5;
  --blue-h:     #4338CA;
  --blue-lt:    #818CF8;
  --blue-soft:  #EEF0FF;
  --blue-line:  #C9CDFA;
  --pur:        #7C3AED;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

body{
  font-family:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(880px 480px at 85% -12%, rgba(79,70,229,.13), transparent 62%),
    radial-gradient(700px 480px at -8% 110%, rgba(124,58,237,.08), transparent 58%),
    var(--paper);
  color:var(--ink); text-align:center; padding:24px;
  -webkit-font-smoothing:antialiased;
}
a:focus-visible{ outline:3px solid var(--blue); outline-offset:3px; border-radius:6px }

.box{ max-width:500px }

/* brand lockup — same as the login page */
.brand{ display:inline-flex; align-items:center; gap:11px; margin-bottom:30px }
.brand .logo{
  width:38px; height:38px; border-radius:50%;
  overflow:hidden; flex-shrink:0;
  border:1.5px solid var(--blue-line);
  box-shadow:0 0 0 3px rgba(79,70,229,.08);
}
.brand .logo img{ width:100%; height:100%; object-fit:cover; display:block }
.brand .dot{
  width:7px; height:7px; border-radius:2px; background:var(--blue);
  flex-shrink:0; animation:pip 2.5s infinite;
}
@keyframes pip{ 0%,100%{opacity:1} 50%{opacity:.25} }
.brand .name{
  font-size:.95rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--ink);
}
.brand .name span{ color:var(--blue) }

.code{
  font-family:'Newsreader', Georgia, serif;
  font-size:clamp(4.5rem, 14vw, 7rem);
  font-weight:500; letter-spacing:-.03em; line-height:1;
  color:var(--ink);
}
.code span{ color:var(--blue) }

h1{
  font-size:1.25rem; font-weight:700; letter-spacing:-.015em;
  color:var(--ink); margin:12px 0 8px;
}
p{
  font-size:.9rem; color:var(--ink-soft); line-height:1.7;
  max-width:400px; margin:0 auto 30px;
}

.btns{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap }
a.btn{
  display:inline-flex; align-items:center; gap:8px;
  font-size:.9rem; font-weight:600; text-decoration:none;
  padding:12px 24px; border-radius:9px;
  white-space:nowrap;
  transition:background .16s, border-color .16s, transform .12s, box-shadow .16s;
}
.solid{
  background:var(--blue); color:#fff; border:1px solid var(--blue);
  box-shadow:0 8px 20px rgba(79,70,229,.26);
}
.solid:hover{ background:var(--blue-h); border-color:var(--blue-h); transform:translateY(-1px); box-shadow:0 10px 24px rgba(79,70,229,.32) }
.ghost{ background:#fff; color:var(--ink); border:1px solid var(--field-line) }
.ghost:hover{ border-color:var(--ink) }

@media(max-width:520px){
  .btns{ flex-direction:column }
  a.btn{ justify-content:center }
}
@media (prefers-reduced-motion: reduce){
  *, *::before, *::after{ animation:none !important; transition:none !important }
}
</style>
</head>
<body>
<div class="box">

  <a href="/" class="brand" aria-label="JAYISAAC AI home">
    <span class="logo"><img src="/public/new-logo2.jpg" alt=""></span>
    <span class="dot"></span>
    <span class="name">JAYISAAC&nbsp;<span>AI</span></span>
  </a>

  <div class="code">4<span>0</span>4</div>
  <h1>This page isn't in the database</h1>
  <p>The link is dead or the page moved. Unlike our contact records, we couldn't verify this one.</p>

  <div class="btns">
    <a class="btn solid" href="/">Back to Home</a>
    <a class="btn ghost" href="/app.html">Open the App</a>
    <a class="btn ghost" href="/contact.html">Report a Broken Link</a>
  </div>

</div>
</body>
</html>
